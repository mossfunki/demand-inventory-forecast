name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate data
        run: python data/generate_data.py

      - name: Run forecast pipeline
        run: python src/forecast.py

      - name: Run inventory pipeline
        run: python src/inventory.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs
          path: outputs/
